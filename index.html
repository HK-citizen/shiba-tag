<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shiba Tag: Distortion World</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --paper: #f3e5ab; --wood: #8b4513; --teal: #008080; --red: #b22222; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .screen { width: 800px; height: 550px; border: 4px solid #fff; position: relative; overflow: hidden; background: #050510; }
        .hidden { display: none !important; }

        /* News Banner */
        #news { position: absolute; top: 0; width: 100%; height: 30px; background: rgba(178, 34, 34, 0.8); z-index: 100; line-height: 30px; font-weight: bold; overflow: hidden; }
        #news div { display: inline-block; padding-left: 100%; animation: scroll 12s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-150%); } }

        /* Backpack (Matches your screenshot) */
        #btn-backpack { position: absolute; left: 45px; top: 55px; width: 100px; z-index: 10; cursor: pointer; text-align: center; }
        .bag-icon { width: 60px; height: 70px; background: var(--teal); border: 3px solid #000; border-radius: 5px; margin: 0 auto; position: relative; box-shadow: inset -5px 0 rgba(0,0,0,0.2); }
        .bag-icon::before { content: ''; position: absolute; top: 0; left: -5px; width: 70px; height: 20px; background: var(--red); border: 3px solid #000; border-radius: 5px; }
        .bag-icon::after { content: ''; position: absolute; top: 25px; left: 15px; width: 5px; height: 15px; background: #ccc; border: 2px solid #000; box-shadow: 20px 0 #ccc; }

        /* Quest Scroll */
        #btn-quest { position: absolute; right: 45px; top: 55px; width: 140px; height: 40px; background: var(--paper); color: var(--wood); border: 3px solid var(--wood); cursor: pointer; font-weight: bold; z-index: 10; display: flex; align-items: center; justify-content: center; }
        #scroll-content { position: absolute; top: 95px; right: 45px; width: 220px; height: 0; background: var(--paper); color: var(--wood); transition: 0.5s; overflow: hidden; z-index: 9; border: 0px solid var(--wood); }
        #scroll-content.open { height: 180px; border: 3px solid var(--wood); padding: 10px; }

        /* Play Button */
        #btn-play { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); width: 100px; height: 70px; background: #2ecc71; border: 4px solid #fff; cursor: pointer; font-size: 40px; color: white; border-radius: 15px; z-index: 10; }

        /* Overlay Menus */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-opt { background: #444; border: 2px solid #fff; padding: 15px 30px; margin: 10px; cursor: pointer; color: white; font-weight: bold; width: 200px; }
        .btn-opt:hover { background: #666; }

        #hud { position: absolute; bottom: 0; width: 100%; height: 50px; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: space-around; border-top: 2px solid #fff; }
    </style>
</head>
<body>

    <div class="screen">
        <div id="news"><div>🚨 UPDATE: CUTE SHIBA FORM UNLOCKED! • GIRATINA IS WATCHING... • CHECK YOUR BACKPACK! 🚨</div></div>

        <div id="main-menu">
            <canvas id="menuCanvas"></canvas>
            <div id="btn-backpack" onclick="alert('Wins: '+stats.wins)">
                <div class="bag-icon"></div>
                <div style="font-size: 12px; margin-top: 5px;">BACKPACK</div>
            </div>
            <div id="btn-quest" onclick="document.getElementById('scroll-content').classList.toggle('open')">📜 QUEST</div>
            <div id="scroll-content">
                <b>MISSIONS:</b><hr>
                • Win 10 (UNO)<br>• Stun 20 (DAGGERS)
            </div>
            <button id="btn-play" onclick="showOverlay('mode-select')">▶</button>
        </div>

        <div id="mode-select" class="overlay hidden">
            <h1>SELECT MODE</h1>
            <div class="btn-opt" onclick="setMode('ai')">SOLO VS AI</div>
            <div class="btn-opt" onclick="setMode('multi')">MULTIPLAYER</div>
        </div>

        <div id="wep-select" class="overlay hidden">
            <h1>CHOOSE WEAPON</h1>
            <div class="btn-opt" onclick="startGame('none')">NO WEAPON</div>
            <div class="btn-opt" onclick="startGame('uno')">UNO CARD</div>
            <div id="dag-btn" class="btn-opt" onclick="startGame('dagger')">SOUL DAGGERS</div>
        </div>

        <div id="game-view" class="hidden">
            <canvas id="gameCanvas" width="800" height="500"></canvas>
            <div id="hud">
                <b id="timer">03:00</b>
                <b id="status">YOU ARE IT</b>
            </div>
        </div>
    </div>

    <script>
        const mCanvas = document.getElementById('menuCanvas');
        const mCtx = mCanvas.getContext('2d');
        mCanvas.width = 800; mCanvas.height = 550;
        
        let stats = JSON.parse(localStorage.getItem('shibaStats')) || { wins: 0, stuns: 0 };
        let frame = 0, gameActive = false;

        function drawCuteShiba(ctx, x, y, color, scale=1) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            // Body & Tail
            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 40, 30);
            ctx.fillRect(-10, 5, 10, 10); // Tail
            // Ears
            ctx.beginPath(); ctx.moveTo(5,0); ctx.lineTo(15,0); ctx.lineTo(5,-12); ctx.fill();
            ctx.beginPath(); ctx.moveTo(25,0); ctx.lineTo(35,0); ctx.lineTo(35,-12); ctx.fill();
            // White Belly/Face
            ctx.fillStyle = "white";
            ctx.fillRect(5, 15, 30, 15);
            ctx.fillRect(25, 5, 15, 10);
            // Eyes & Nose
            ctx.fillStyle = "black";
            ctx.fillRect(32, 10, 4, 4);
            ctx.fillRect(38, 14, 3, 3);
            ctx.restore();
        }

        function drawGiratina(ctx) {
            let pulse = Math.abs(Math.sin(frame * 0.05));
            ctx.fillStyle = "#222";
            // Wings/Tentacles
            ctx.beginPath();
            ctx.moveTo(400, 200); ctx.quadraticCurveTo(100, 50, 50, 400);
            ctx.moveTo(400, 200); ctx.quadraticCurveTo(700, 50, 750, 400);
            ctx.lineWidth = 20; ctx.strokeStyle = "#111"; ctx.stroke();
            // Body
            ctx.fillStyle = "#333";
            ctx.fillRect(360, 150, 80, 250);
            // Eyes
            ctx.shadowBlur = 20 * pulse; ctx.shadowColor = "red";
            ctx.fillStyle = `rgba(255, 0, 0, ${pulse})`;
            ctx.fillRect(375, 190, 15, 8); ctx.fillRect(410, 190, 15, 8);
            ctx.shadowBlur = 0;
        }

        function menuLoop() {
            if(gameActive) return;
            mCtx.clearRect(0,0,800,550);
            frame++;
            drawGiratina(mCtx);
            drawCuteShiba(mCtx, 380, 300 + Math.sin(frame*0.05)*20, "#E19A4E", 1.2);
            requestAnimationFrame(menuLoop);
        }

        function showOverlay(id) {
            document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function setMode(m) {
            gameMode = m;
            showOverlay('wep-select');
        }

        function startGame(wep) {
            selectedWep = wep;
            gameActive = true;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('wep-select').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            // The actual game loop would trigger here
        }

        menuLoop();
    </script>
</body>
</html>
